<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Profile Card</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    article {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

  <header>
    <h1>My Company</h1>
    <p>Your trusted partner in success</p>
  </header>

  <main>
    <article>
      <h2>About Us</h2>
      <p>We are a company dedicated to providing high-quality services.</p>
    </article>
  </main>

  <footer>
    <p>© 2026 My Company</p>

    <button style="background-color: blue; color: white; padding: 10px;">
      Contact Us
    </button>
  </footer>

</body>
</html>
